name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  harness:
    name: Harness evaluator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: XLerate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: XLerate/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run evaluator
        run: npm run ci:all
