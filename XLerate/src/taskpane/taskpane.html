<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XLerate</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css" />
  <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>
<body class="ms-Fabric">
  <section id="sideload-msg" class="app">
    <h3>Please sideload the add-in to use XLerate actions.</h3>
  </section>

  <main id="app-body" class="app" style="display: none;">
    <header class="header">
      <img width="32" height="32" src="../../assets/icon-32.png" alt="XLerate" />
      <h1>XLerate</h1>
    </header>

    <div class="panel">
      <h3>Formatting / Formulas</h3>
      <button id="run-cycle-number-format" class="action-btn">Cycle Number Format (Selection)</button>
      <button id="run-switch-sign" class="action-btn">Switch Sign (Selection)</button>

      <div class="row">
        <label for="error-value">Error Wrap fallback</label>
        <input id="error-value" type="text" value="NA()" />
      </div>
      <button id="run-error-wrap" class="action-btn">Error Wrap (Selection)</button>
      <button id="run-smart-fill-right" class="action-btn">Smart Fill Right (Active Cell)</button>
      <button id="run-formula-consistency" class="action-btn">Formula Consistency (Selection)</button>
    </div>

    <div class="panel">
      <h3>CAGR</h3>
      <p>Select a range, then calculate CAGR from first to last value.</p>
      <button id="run-cagr" class="action-btn">Calculate CAGR</button>
      <div class="result">Result: <span id="cagr-result">-</span></div>
    </div>

    <div class="panel status">
      <strong>Status</strong>
      <p id="status-text">Ready.</p>
    </div>
  </main>
</body>
</html>
